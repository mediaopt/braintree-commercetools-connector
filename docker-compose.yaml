version: "2.0"

services:
  jwt-server:
    image: node:alpine
    restart: always
    command:
      - npx
      - --package
      - jwt-mock-server
      - -y
      - start
    ports:
      - 9002:9000

  enabler:
    image: node:lts-bookworm-slim
    volumes:
      - ./braintree-enabler:/home/node/app
    restart: always
    working_dir: /home/node/app
    depends_on:
      - processor
    command: /bin/sh -c 'npm install && npm run dev -- --host 0.0.0.0 --port 3000'
    env_file:
      - ./braintree-enabler/.env
    environment:
      - VITE_PROCESSOR_URL=http://localhost:8080
    ports:
      - 3000:3000

  processor:
    image: node:lts-bookworm-slim
    volumes:
      - ./braintree-processor:/home/node/app
      - ./common-connect:/home/node/common-connect
    working_dir: /home/node/app
    depends_on:
      - jwt-server
    env_file:
      - ./braintree-processor/.env
    environment:
      - CTP_JWKS_URL=http://jwt-server:9000/jwt/.well-known/jwks.json
      - CTP_JWT_ISSUER=https://issuer.com
    command: /bin/sh -c 'npm install && npm run watch'
    ports:
      - 8080:8080
