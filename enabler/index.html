            <div class="form-group col-md-6">

                class="form-control"
                style="min-height: 48px"
              ></div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <button id="loadComponents" class="btn btn-primary btn-block">
                Load Components
              </button>
            </div>
            <div class="col-md-6">
              <button id="clearComponents" class="btn btn-secondary btn-block">

            <!--              </button>-->

            <!--              <button id="clearComponents" class="btn btn-secondary btn-block">-->
            <!--                Clear-->
            <!--              </button>-->
            <!--            </div>-->
          </div>

          <div id="spinner" class="mt-3 text-center d-none">
            <div class="spinner-border text-primary" role="status">
              <span class="sr-only">Loading...</span>
            </div>
            <div>Initializing components...</div>
          </div>
        </div>

            class="form-group form-check d-none"

            <input

              class="form-check-input"
              id="storePaymentMethod"
            />
            <label class="form-check-label" for="storePaymentMethod"
              >Check to store payment method</label
            >
          </div>

          <div
            id="removeStorePaymentMethod-container"
            class="form-group d-none"
          >
            <button
              id="removeStorePaymentMethod"
